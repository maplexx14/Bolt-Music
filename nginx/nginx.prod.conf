server {
    listen 80;
    server_name localhost;

    # Maximum upload size for music files
    client_max_body_size 50M;

    # Serve statically built React frontend
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to backend
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Serve static music files with specialized audio streaming headers
    location /music_files/ {
        alias /var/www/music_files/;
        # Optional: enable caching
        expires 30d;
        add_header Cache-Control "public, no-transform";
        
        # Audio specific adjustments
        add_header Accept-Ranges bytes;
        default_type application/octet-stream;
        types {
            audio/mpeg mp3;
            audio/mp4 m4a;
            audio/x-m4a m4a;
            audio/ogg ogg;
            audio/x-wav wav;
            audio/flac flac;
        }
    }

    # Serve static cover files
    location /cover_files/ {
        alias /var/www/cover_files/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
